name: Publish to NuGet

# Publishes Xero.DataComparer.Core to NuGet.org whenever a GitHub Release is published.
# Uses Trusted Publishing (OIDC) - no long-lived API key is stored in the repo.
# The package version is taken from the release tag (e.g. tag "v1.2.0" -> version 1.2.0).
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for OIDC: lets the job request a token GitHub signs for nuget.org

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"      # strip a leading "v" if present
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version ${VERSION} (from tag ${TAG})"

      - name: Restore
        run: dotnet restore Xero.DataComparer.Core/Xero.DataComparer.Core.csproj

      - name: Build
        run: >
          dotnet build Xero.DataComparer.Core/Xero.DataComparer.Core.csproj
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: >
          dotnet pack Xero.DataComparer.Core/Xero.DataComparer.Core.csproj
          --configuration Release
          --no-build
          -p:Version=${{ steps.version.outputs.version }}
          --output ${{ github.workspace }}/artifacts

      # Exchange the GitHub OIDC token for a short-lived (1 hour) NuGet API key.
      # Requires a Trusted Publishing policy configured on nuget.org for this repo + workflow file.
      - name: NuGet login (OIDC -> temporary API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org username (profile name), NOT your email

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
